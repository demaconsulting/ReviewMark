---
# PathHelpers Software Unit Requirements
#
# PURPOSE:
# - Define requirements for the PathHelpers software unit
# - This unit provides safe path operations that prevent path traversal attacks
# - It is used by Index.cs and Validation.cs when constructing file paths

sections:
  - title: PathHelpers Unit Requirements
    requirements:
      - id: ReviewMark-PathHelpers-SafeCombine
        title: The PathHelpers shall safely combine a base path and a relative path, rejecting path traversal attempts.
        justification: |
          When constructing file paths from user-supplied or externally-sourced components
          (such as relative paths read from an evidence index), the tool must prevent path
          traversal attacks. SafePathCombine validates that the relative path does not
          contain '..' sequences or absolute path components, and performs a defense-in-depth
          check that the resolved combined path remains under the base directory.
        tests:
          - PathHelpers_SafePathCombine_ValidPaths_ReturnsCombinedPath
          - PathHelpers_SafePathCombine_NullBasePath_ThrowsArgumentNullException
          - PathHelpers_SafePathCombine_NullRelativePath_ThrowsArgumentNullException
          - PathHelpers_SafePathCombine_PathTraversal_ThrowsArgumentException
          - PathHelpers_SafePathCombine_AbsoluteRelativePath_ThrowsArgumentException
          - PathHelpers_SafePathCombine_NestedPath_ReturnsCombinedPath
