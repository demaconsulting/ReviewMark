---
# BuildMark OTS requirements
sections:
  - title: OTS Software Requirements
    sections:
      - title: BuildMark Requirements
        requirements:
          - id: BuildMark-Core-GenerateBuildNotes
            title: BuildMark shall generate build-notes documentation from GitHub Actions metadata.
            justification: |
              Release artifacts must include auditable build documentation identifying which
              pipeline run produced them, which tool versions were used, and what workflows
              succeeded. BuildMark provides this traceability evidence automatically from GitHub
              Actions metadata, ensuring every published release has a verifiable provenance
              record without requiring manual documentation effort.
            tags: [ots]
            tests:
              - BuildMark_MarkdownReportGeneration
