---
# VersionMark OTS Software Requirements
#
# Requirements for the VersionMark version tracking tool functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: VersionMark Requirements
        requirements:
          - id: ReviewMark-OTS-VersionMark
            title: VersionMark shall publish captured tool-version information.
            justification: |
              Compliance traceability and audit evidence require that the versions of all
              tools used in the build pipeline are documented in the release artifacts.
              DemaConsulting.VersionMark captures version metadata for each pipeline tool
              and publishes a human-readable versions document included in the build notes.
              This provides auditors and reviewers with a permanent record of which tool
              versions were used to produce each release, satisfying traceability obligations
              without manual data-entry.
            tags: [ots]
            tests:
              - VersionMark_CapturesVersions
              - VersionMark_GeneratesMarkdownReport
