---
# FileAssert OTS requirements
sections:
  - title: OTS Software Requirements
    sections:
      - title: FileAssert Requirements
        requirements:
          - id: ReviewMark-OTS-FileAssert
            title: FileAssert shall confirm operational availability by successfully completing self-validation.
            justification: |
              The documentation build pipeline produces HTML and PDF artifacts from multiple tools.
              Without automated assertion, undetected truncation, empty files, or missing content
              could pass unnoticed into release evidence. FileAssert provides a reliable,
              reproducible gate that confirms each generated document exists, is structurally
              valid, and contains expected content. Its secondary role is providing OTS evidence
              for Pandoc and WeasyPrint by asserting their respective outputs. Self-validation
              through --validate confirms FileAssert itself is operational before ReqStream
              consumes the assertion results.
            tags: [ots]
            tests:
              - FileAssert_VersionDisplay
              - FileAssert_HelpDisplay
