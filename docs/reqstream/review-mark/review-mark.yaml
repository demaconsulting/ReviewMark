---
# ReviewMark System-Level Requirements
#
# PURPOSE:
# - Define system-level requirements describing what end-users need the ReviewMark tool to provide
# - These requirements capture the externally visible behavior of the complete ReviewMark system
# - Unit-level requirements (per-class behavior) are in the individual *-requirements.yaml files

sections:
  - title: System-Level Requirements
    requirements:
      - id: ReviewMark-System-ReviewPlan
        title: >-
          The tool shall generate a Review Plan document listing all files requiring review and their
          review-set coverage.
        justification: |
          In regulated environments, auditors require evidence that every file subject to review
          is covered by at least one named review-set. The Review Plan document provides this
          evidence automatically on each CI/CD run, replacing manual tracking spreadsheets.
        tests:
          - IntegrationTest_ReviewPlanGeneration
        children:
          - ReviewMark-Cmd-Plan
          - ReviewMark-Configuration-PlanGeneration

      - id: ReviewMark-System-ReviewReport
        title: The tool shall generate a Review Report document listing every review-set and its current review status.
        justification: |
          Auditors need evidence that the review evidence for each review-set is current —
          that the reviewed files have not changed since the review was conducted. The Review
          Report provides this evidence automatically, showing Current, Stale, Missing, or
          Failed status for each review-set.
        tests:
          - IntegrationTest_ReviewReportGeneration
        children:
          - ReviewMark-Cmd-Report
          - ReviewMark-Configuration-ReportGeneration

      - id: ReviewMark-System-Enforce
        title: The tool shall return a non-zero exit code when enforcement is enabled and any review-set is not current.
        justification: |
          CI/CD pipelines must be able to gate releases on review coverage. The --enforce flag
          enables this by causing the tool to exit with a non-zero code in two situations: when
          the Review Plan shows that files matching needs-review are not covered by any
          review-set, or when the Review Report shows that any review-set has Stale, Missing, or
          Failed status. This makes incomplete file coverage, out-of-date reviews, and failed
          reviews all build-breaking conditions.
        tests:
          - IntegrationTest_Enforce
        children:
          - ReviewMark-Cmd-Enforce

      - id: ReviewMark-System-IndexScan
        title: The tool shall scan PDF evidence files and write an index.json when the --index flag is provided.
        justification: |
          Review evidence PDFs contain embedded metadata (id, fingerprint, date, result) in their
          Keywords field. The --index command scans a directory of such PDFs and writes an
          index.json, enabling the evidence store to be refreshed after new review PDFs are added
          without manual maintenance of the index file.
        tests:
          - IntegrationTest_IndexScan
        children:
          - ReviewMark-Cmd-Index
          - ReviewMark-Indexing-ScanPdfEvidence

      - id: ReviewMark-System-Validate
        title: The tool shall execute self-validation tests when the --validate flag is provided.
        justification: |
          Regulated environments require tool qualification evidence to demonstrate that the tool
          functions correctly in its specific deployment environment. The --validate flag triggers
          a built-in test suite that exercises core tool behaviors and produces a pass/fail report.
        tests:
          - IntegrationTest_ValidateFlag_RunsValidation
        children:
          - ReviewMark-Cmd-Validate
          - ReviewMark-SelfTest-Qualification

      - id: ReviewMark-System-Version
        title: The tool shall display the version string when the --version flag is provided.
        justification: |
          Users need to quickly identify the version of the tool they are using for
          troubleshooting and compatibility verification.
        tests:
          - IntegrationTest_VersionFlag_OutputsVersion
        children:
          - ReviewMark-Cmd-Version

      - id: ReviewMark-System-Help
        title: The tool shall display usage information when the --help flag is provided.
        justification: |
          Users need access to command-line usage documentation without requiring external resources.
        tests:
          - IntegrationTest_HelpFlag_OutputsUsageInformation
        children:
          - ReviewMark-Cmd-Help

      - id: ReviewMark-System-WorkingDirectory
        title: The tool shall support a --dir flag to set the working directory for file operations.
        justification: |
          Allows users to target an evidence store or project directory without changing
          the process working directory, enabling consistent scripting and CI/CD usage.
        tests:
          - IntegrationTest_WorkingDirectoryOverride
        children:
          - ReviewMark-Cmd-Dir

      - id: ReviewMark-System-Elaborate
        title: The tool shall print a Markdown elaboration of a review set when --elaborate is provided.
        justification: |
          When preparing for a review, the reviewer needs the review set ID, its current
          fingerprint, and the full sorted list of files to be reviewed.
        tests:
          - IntegrationTest_Elaborate
        children:
          - ReviewMark-Cmd-Elaborate

      - id: ReviewMark-System-Lint
        title: >-
          The tool shall validate the definition file and report only issue messages when
          --lint is provided, producing no output on success.
        justification: |
          Users need a way to verify that the .reviewmark.yaml configuration file is valid
          before running the main tool. Suppressing the banner and summary on success
          (silence-on-success) allows the exit code alone to signal whether the file is
          valid, improving integration with linting scripts and CI pipelines.
        tests:
          - IntegrationTest_Lint
        children:
          - ReviewMark-Cmd-Lint

      - id: ReviewMark-System-Silent
        title: The tool shall support --silent flag to suppress console output.
        justification: |
          Enables automated scripts and CI/CD pipelines to run the tool without cluttering
          output logs when only the exit code is needed.
        tests:
          - IntegrationTest_SilentFlag_SuppressesOutput
        children:
          - ReviewMark-Cmd-Silent

      - id: ReviewMark-System-Log
        title: The tool shall support --log flag to write output to a persistent log file.
        justification: |
          Provides persistent logging for debugging and audit trails when running in CI/CD
          environments where console output may not be captured.
        tests:
          - IntegrationTest_LogFlag_WritesOutputToFile
        children:
          - ReviewMark-Cmd-Log

      - id: ReviewMark-System-Depth
        title: The tool shall apply the --depth flag as the default Markdown heading depth for all
          generated documents, unless overridden by --plan-depth or --report-depth.
        justification: |
          Allows users to set the heading depth once and have it apply to the review plan,
          review report, and self-validation report, unless a more specific flag is provided.
          Default depth is 1 when not specified.
        tests:
          - IntegrationTest_DepthFlag_SetsDefaultHeadingDepth
          - IntegrationTest_DepthFlag_SetsValidationHeadingDepth
        children:
          - ReviewMark-Cmd-Depth

      - id: ReviewMark-System-InvalidArgs
        title: The tool shall reject unknown command-line arguments with a non-zero exit code.
        justification: |
          Providing clear feedback for invalid arguments helps users quickly correct mistakes
          and prevents silent misconfiguration in automated environments.
        tests:
          - IntegrationTest_UnknownArgument_ReturnsError
        children:
          - ReviewMark-Cmd-InvalidArgs

      - id: ReviewMark-System-Results
        title: The tool shall write validation results to a standard test result file when --results is provided.
        justification: |
          Enables integration with CI/CD systems and requirements traceability tools that
          expect standard TRX or JUnit XML test result formats.
        tests:
          - IntegrationTest_ValidateWithResults_GeneratesTrxFile
          - IntegrationTest_ValidateWithResults_GeneratesJUnitFile
        children:
          - ReviewMark-Cmd-Results
