---
# PathHelpers unit requirements
sections:
  - title: ReviewMark Requirements
    sections:
      - title: Indexing Requirements
        sections:
          - title: PathHelpers Requirements
            requirements:
              - id: ReviewMark-PathHelpers-SafeCombine
                title: The PathHelpers shall safely combine a base path and a relative path.
                justification: |
                  When constructing file paths from user-supplied or externally-sourced components
                  (such as relative paths read from an evidence index), the tool must be able to
                  combine a base directory path with a relative path to produce a valid result.
                  This is a prerequisite for any subsequent path-traversal validation.
                tests:
                  - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly
                  - PathHelpers_SafePathCombine_NestedPaths_CombinesCorrectly
                  - PathHelpers_SafePathCombine_CurrentDirectoryReference_CombinesCorrectly
                  - PathHelpers_SafePathCombine_EmptyRelativePath_ReturnsBasePath

              - id: ReviewMark-PathHelpers-TraversalRejection
                title: The PathHelpers shall reject path traversal attempts by throwing ArgumentException.
                justification: |
                  When combining paths from user-supplied or externally-sourced components, the tool
                  must prevent path traversal attacks. The combined path must be verified to remain
                  within the base directory, ensuring that no input can cause access to files outside
                  the intended directory scope. This includes rejection of relative traversal segments
                  (such as `..`) and absolute path injection.
                tests:
                  - PathHelpers_SafePathCombine_PathTraversalWithDoubleDots_ThrowsArgumentException
                  - PathHelpers_SafePathCombine_DoubleDotsInMiddle_ThrowsArgumentException
                  - PathHelpers_SafePathCombine_AbsoluteUnixPath_ThrowsArgumentException
                  - windows@PathHelpers_SafePathCombine_AbsoluteWindowsPath_ThrowsArgumentException

              - id: ReviewMark-PathHelpers-NullRejection
                title: "The PathHelpers shall reject null inputs by throwing ArgumentNullException."
                justification: |
                  When basePath or relativePath is null, the operation must be rejected with a
                  clear error so the caller can report a diagnostic rather than encountering an
                  unhandled error.
                tests:
                  - PathHelpers_SafePathCombine_NullBasePath_ThrowsArgumentNullException
                  - PathHelpers_SafePathCombine_NullRelativePath_ThrowsArgumentNullException
