---
# PathHelpers Software Unit Requirements
#
# PURPOSE:
# - Define requirements for the PathHelpers software unit
# - This unit provides safe path operations that prevent path traversal attacks
# - It is used by ReviewIndex.cs and Validation.cs when constructing file paths

sections:
  - title: PathHelpers Unit Requirements
    requirements:
      - id: ReviewMark-PathHelpers-SafeCombine
        title: The PathHelpers shall safely combine a base path and a relative path, rejecting path traversal attempts.
        justification: |
          When constructing file paths from user-supplied or externally-sourced components
          (such as relative paths read from an evidence index), the tool must prevent path
          traversal attacks. SafePathCombine combines the paths and then resolves both to
          absolute form, using Path.GetRelativePath to verify the combined path remains
          within the base directory. This post-combine canonical-path check handles all
          traversal patterns without fragile pre-combine string inspection.
        tests:
          - PathHelpers_SafePathCombine_ValidPaths_CombinesCorrectly
          - PathHelpers_SafePathCombine_PathTraversalWithDoubleDots_ThrowsArgumentException
          - PathHelpers_SafePathCombine_AbsolutePath_ThrowsArgumentException
          - PathHelpers_SafePathCombine_NestedPaths_CombinesCorrectly
