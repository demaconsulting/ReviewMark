---
# Command-Line Interface Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the ReviewMark command-line interface subsystem
# - The CLI subsystem spans Context.cs (argument parsing) and Program.cs (orchestration)
# - Subsystem requirements describe the externally visible CLI behavior

sections:
  - title: Command-Line Interface Subsystem Requirements
    requirements:
      - id: ReviewMark-Cmd-Context
        title: The tool shall implement a Context class for command-line argument handling.
        justification: |
          Provides a standardized approach to command-line argument parsing and output
          handling across all DEMA Consulting DotNet Tools.
        tests:
          - Cli_VersionFlag_OutputsVersionOnly
        children: [ReviewMark-Context-Parsing, ReviewMark-Context-Output]

      - id: ReviewMark-Cmd-Version
        title: The tool shall support -v and --version flags to display version information.
        justification: |
          Users need to quickly identify the version of the tool they are using for
          troubleshooting and compatibility verification.
        tests:
          - Cli_VersionFlag_OutputsVersionOnly
        children: [ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-Help
        title: The tool shall support -?, -h, and --help flags to display usage information.
        justification: |
          Users need access to command-line usage documentation without requiring
          external resources.
        tests:
          - Cli_HelpFlag_OutputsUsageInformation
        children: [ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-Silent
        title: The tool shall support --silent flag to suppress console output.
        justification: |
          Enables automated scripts and CI/CD pipelines to run the tool without
          cluttering output logs.
        tests:
          - Cli_SilentFlag_SuppressesOutput
        children: [ReviewMark-Context-Output]

      - id: ReviewMark-Cmd-Validate
        title: The tool shall support --validate flag to run self-validation tests.
        justification: |
          Provides a built-in mechanism to verify the tool is functioning correctly
          in the deployment environment.
        tests:
          - Cli_ValidateFlag_RunsValidation
        children: [ReviewMark-Program-Dispatch, ReviewMark-Validation-Run]

      - id: ReviewMark-Cmd-Results
        title: The tool shall support --results flag to write validation results in TRX or JUnit format.
        justification: |
          Enables integration with CI/CD systems that expect standard test result formats.
        tests:
          - Cli_ResultsFlag_GeneratesTrxFile
        children: [ReviewMark-Validation-ResultsFile]

      - id: ReviewMark-Cmd-Log
        title: The tool shall support --log flag to write output to a log file.
        justification: |
          Provides persistent logging for debugging and audit trails.
        tests:
          - Cli_LogFlag_WritesOutputToFile
        children: [ReviewMark-Context-Output]

      - id: ReviewMark-Cmd-ErrorOutput
        title: The tool shall write error messages to stderr.
        justification: |
          Error messages must be written to stderr so they remain visible to the user
          without polluting stdout, which consumers may pipe or redirect for data capture.
        tests:
          - Cli_ErrorOutput_WritesToStderr
        children: [ReviewMark-Context-Output]

      - id: ReviewMark-Cmd-InvalidArgs
        title: The tool shall reject unknown or malformed command-line arguments with a descriptive error.
        justification: |
          Providing clear feedback for invalid arguments helps users quickly correct
          mistakes and prevents silent misconfiguration.
        tests:
          - Cli_InvalidArgs_ReturnsNonZeroExitCode
        children: [ReviewMark-Context-Parsing]

      - id: ReviewMark-Cmd-ExitCode
        title: The tool shall return a non-zero exit code on failure.
        justification: |
          Callers (scripts, CI/CD pipelines) must be able to detect failure conditions
          programmatically via the process exit code.
        tests:
          - Cli_ExitCode_ReturnsNonZeroOnError
        children: [ReviewMark-Context-Output]

      - id: ReviewMark-Cmd-Definition
        title: The tool shall support --definition flag to specify the definition YAML file.
        justification: |
          Users must be able to specify the path to the .reviewmark.yaml definition file,
          which configures needs-review patterns, evidence source, and review set definitions.
        tests:
          - Cli_DefinitionFlag_LoadsSpecifiedFile
        children: [ReviewMark-Config-Loading, ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-Plan
        title: The tool shall support --plan flag to write the review plan to a Markdown file.
        justification: |
          Enables automated generation of a review plan document that lists all review sets
          and coverage status, suitable for inclusion in release documentation.
        tests:
          - Cli_PlanFlag_GeneratesReviewPlan
        children: [ReviewMark-Config-Reading, ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-PlanDepth
        title: The tool shall support --plan-depth flag to set the Markdown heading depth for the review plan.
        justification: |
          Allows the review plan to be embedded at any heading level within a larger
          Markdown document, with a default depth of 1 when not specified.
        tests:
          - Cli_PlanFlag_GeneratesReviewPlan
        children: [ReviewMark-Context-Parsing]

      - id: ReviewMark-Cmd-Report
        title: The tool shall support --report flag to write the review report to a Markdown file.
        justification: |
          Enables automated generation of a review report document showing the current
          status of each review set against the evidence index, suitable for release documentation.
        tests:
          - Cli_ReportFlag_GeneratesReviewReport
        children: [ReviewMark-Config-Reading, ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-ReportDepth
        title: The tool shall support --report-depth flag to set the Markdown heading depth for the review report.
        justification: |
          Allows the review report to be embedded at any heading level within a larger
          Markdown document, with a default depth of 1 when not specified.
        tests:
          - Cli_ReportFlag_GeneratesReviewReport
        children: [ReviewMark-Context-Parsing]

      - id: ReviewMark-Cmd-Index
        title: The tool shall support --index flag to scan PDF evidence files matching a glob path and write
          index.json.
        justification: |
          Provides a mechanism to regenerate the review evidence index from scanned PDF
          files, reading embedded metadata from each PDF's Keywords field to populate
          the index with review IDs, fingerprints, dates, results, and file names.
        tests:
          - Cli_IndexFlag_CreatesIndexJson
        children: [ReviewMark-Index-PdfParsing, ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-Enforce
        title: The tool shall support --enforce flag to exit with a non-zero code when there are review issues.
        justification: |
          Enables CI/CD pipelines to block downstream stages when review sets are failed,
          stale, or missing, or when files requiring review are not covered by any review-set.
          Without --enforce the tool generates the plan and report but exits with code 0.
        tests:
          - Cli_EnforceFlag_ExitsNonZeroWhenNotCurrent
        children: [ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-Dir
        title: The tool shall support --dir flag to set the working directory for file operations.
        justification: |
          Allows users to target an evidence store or project directory without changing
          the process working directory, enabling consistent scripting and CI/CD usage
          without requiring a cd command before invoking the tool.
        tests:
          - Cli_DirFlag_SetsWorkingDirectory
        children: [ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-Elaborate
        title: The tool shall support --elaborate <id> flag to print a Markdown elaboration of a review set.
        justification: |
          When preparing for a review, the reviewer needs the review set ID, its current
          fingerprint, and the full sorted list of files to be reviewed. The --elaborate
          command provides this information formatted as Markdown so it can be copied
          directly into review documentation.
        tests:
          - Cli_ElaborateFlag_OutputsElaboration
        children: [ReviewMark-Config-Reading, ReviewMark-Program-Dispatch]

      - id: ReviewMark-Cmd-Lint
        title: The tool shall support --lint flag to validate the definition file and report issues.
        justification: |
          Users need a way to verify that the .reviewmark.yaml configuration file is valid
          before running the main tool, providing clear error messages about the cause and
          location of any issues.
        tests:
          - Cli_LintFlag_ReportsSuccess
        children: [ReviewMark-Config-Loading, ReviewMark-Program-Dispatch]
