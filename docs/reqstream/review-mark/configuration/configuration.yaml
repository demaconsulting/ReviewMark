---
# Configuration Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the ReviewMark Configuration subsystem
# - The Configuration subsystem spans ReviewMarkConfiguration.cs (config loading and processing)
#   and GlobMatcher.cs (file pattern matching)
# - Subsystem requirements describe the externally visible configuration capabilities

sections:
  - title: Configuration Subsystem Requirements
    requirements:
      - id: ReviewMark-Configuration-NeedsReview
        title: The tool shall identify all files requiring review by resolving needs-review glob patterns.
        justification: |
          Users configure which files require review using glob patterns. The Configuration
          subsystem must resolve these patterns to a concrete list of files, applying includes
          and excludes in declaration order, so that ReviewMark can detect uncovered files
          and generate accurate review plans.
        tests:
          - Configuration_LoadConfig_ResolvesNeedsReviewFiles
        children: [ReviewMark-Config-Reading, ReviewMark-GlobMatcher-IncludeExclude]

      - id: ReviewMark-Configuration-Fingerprinting
        title: The tool shall compute content-based fingerprints for review-sets to detect file changes.
        justification: |
          Review-set fingerprints are the mechanism by which ReviewMark detects that files
          have changed since the last review. The fingerprint must be based on file content
          rather than names alone, so that renamed files do not invalidate the fingerprint,
          and changed content always produces a new fingerprint.
        tests:
          - Configuration_LoadConfig_FingerprintReflectsFileContent
          - Configuration_LoadConfig_FingerprintIsRenameInvariant
        children: [ReviewMark-Config-Reading]

      - id: ReviewMark-Configuration-PlanGeneration
        title: The tool shall generate a Review Plan Markdown document listing review-set coverage.
        justification: |
          The Review Plan is a compliance artifact that documents which review-sets exist
          and what files they cover. It enables auditors to verify that all relevant files
          are included in at least one review-set before reviews are conducted.
        tests:
          - Configuration_LoadConfig_PlanGenerationSucceeds
        children: [ReviewMark-Config-Reading, ReviewMark-Config-Loading, ReviewMark-Config-PlanGeneration]

      - id: ReviewMark-Configuration-ReportGeneration
        title: The tool shall generate a Review Report Markdown document showing review-set status.
        justification: |
          The Review Report is a compliance artifact that documents the current review status
          of each review-set (Current, Stale, Missing, or Failed), enabling auditors to
          confirm that all review-sets have current evidence before a release.
        tests:
          - Configuration_LoadConfig_ReportGenerationSucceeds
        children: [ReviewMark-Config-Reading, ReviewMark-Config-Loading, ReviewMark-Config-ReportGeneration]

      - id: ReviewMark-Configuration-Elaboration
        title: The tool shall elaborate a review-set by providing its ID, fingerprint, and file list.
        justification: |
          When preparing for a code review, the reviewer needs the review set ID, its current
          fingerprint, and the full sorted list of files to be reviewed. The elaboration
          command provides this formatted as Markdown so it can be copied directly into
          review documentation.
        tests:
          - Configuration_LoadConfig_ElaborationSucceeds
        children: [ReviewMark-Config-Reading, ReviewMark-Config-Elaboration]

      - id: ReviewMark-Configuration-MalformedYaml
        title: The tool shall return a null configuration with diagnostic issues when the YAML file is malformed.
        justification: |
          A malformed YAML file cannot be parsed into a valid configuration model. Returning
          null with descriptive diagnostic issues allows callers to detect the failure and
          report a meaningful error message to the user, rather than propagating a raw
          YAML parser exception.
        tests:
          - Configuration_LoadConfig_MalformedYaml_ReturnsIssues

      - id: ReviewMark-Configuration-ElaborateUnknownId
        title: The tool shall throw ArgumentException when ElaborateReviewSet is called with an ID
          that does not exist in the configuration.
        justification: |
          Passing an unknown review-set ID to ElaborateReviewSet is a programming error that
          cannot be resolved without correcting the caller. Throwing ArgumentException with
          a clear message enables callers to detect and report the mistake immediately rather
          than silently producing empty output.
        tests:
          - Configuration_LoadConfig_ElaborateUnknownId_ThrowsArgumentException
