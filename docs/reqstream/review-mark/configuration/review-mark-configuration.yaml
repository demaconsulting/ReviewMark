---
# ReviewMarkConfiguration Software Unit Requirements
#
# PURPOSE:
# - Define requirements for the ReviewMarkConfiguration software unit
# - This unit parses the .reviewmark.yaml definition file into an in-memory model
# - It computes SHA256 fingerprints for review-sets and generates plan/report Markdown

sections:
  - title: ReviewMarkConfiguration Unit Requirements
    requirements:
      - id: ReviewMark-Config-Reading
        title: >-
          ReviewMarkConfiguration shall read and parse the .reviewmark.yaml file into an in-memory
          configuration model.
        justification: |
          Enables the tool to read its configuration from the standard `.reviewmark.yaml` file,
          exposing needs-review patterns, evidence source, and review set definitions. Review sets
          support content-based fingerprinting to detect changes to covered files.
        tests:
          - ReviewMarkConfiguration_Parse_NullYaml_ThrowsArgumentNullException
          - ReviewMarkConfiguration_Parse_ValidYaml_ReturnsConfiguration
          - ReviewMarkConfiguration_Parse_NeedsReviewPatterns_ParsedCorrectly
          - ReviewMarkConfiguration_Parse_EvidenceSource_ParsedCorrectly
          - ReviewMarkConfiguration_Parse_Reviews_ParsedCorrectly
          - ReviewMarkConfiguration_Parse_EvidenceSourceWithCredentials_ParsedCorrectly
          - ReviewMarkConfiguration_GetNeedsReviewFiles_ReturnsMatchingFiles
          - ReviewSet_GetFingerprint_SameContent_ReturnsSameFingerprint
          - ReviewSet_GetFingerprint_DifferentContent_ReturnsDifferentFingerprint
          - ReviewSet_GetFingerprint_RenameFile_ReturnsSameFingerprint
          - ReviewMarkConfiguration_Load_FileshareRelativeLocation_ResolvesToAbsolutePath
          - ReviewMarkConfiguration_Parse_NoneEvidenceSource_ParsedCorrectly
          - ReviewMarkConfiguration_Parse_NoneEvidenceSource_NoLocationRequired
      - id: ReviewMark-Config-Loading
        title: The ReviewMarkConfiguration unit shall perform linting during configuration loading,
          returning a result containing both the configuration and all detected issues.
        justification: |
          Combining configuration parsing and linting in a single loading operation ensures
          callers receive comprehensive diagnostics without performing two separate passes.
          All detectable issues are accumulated and returned so the caller can report all
          problems at once.
        tests:
          - ReviewMarkConfiguration_Load_ValidFile_ReturnsConfigurationAndNoIssues
          - ReviewMarkConfiguration_Load_MissingEvidenceSource_ReturnsNullConfigWithErrorIssue
          - ReviewMarkConfiguration_Load_MultipleErrors_ReturnsAllIssues
          - ReviewMarkConfiguration_Load_NoneEvidenceSource_NoIssues
          - ReviewMarkLoadResult_ReportIssues_RoutesIssuesToContext
          - ReviewMarkConfiguration_Load_WhitespaceOnlyPaths_ReturnsLintError

      - id: ReviewMark-Config-LoadingNullOnError
        title: The ReviewMarkConfiguration unit shall return a null configuration in the load result
          when any error-level lint issue is detected.
        justification: |
          Returning null when errors are detected allows callers to distinguish between a
          completely invalid file and a file with only warnings. Null signals that the
          configuration cannot be used.
        tests:
          - ReviewMarkConfiguration_Load_NonExistentFile_ReturnsNullConfigWithErrorIssue
          - ReviewMarkConfiguration_Load_InvalidYaml_ReturnsNullConfigWithErrorIssue
          - ReviewMarkConfiguration_Load_MissingEvidenceSource_ReturnsNullConfigWithErrorIssue

      - id: ReviewMark-Config-PlanGeneration
        title: The ReviewMarkConfiguration unit shall generate a Markdown review plan listing all
          files in the needs-review set and their review-set coverage.
        justification: |
          The tool must generate a Markdown review plan document that lists every file
          in the needs-review file-set and identifies which review-sets provide coverage
          for each file.
        tests:
          - ReviewMarkConfiguration_PublishReviewPlan_AllCovered_NoIssues
          - ReviewMarkConfiguration_PublishReviewPlan_UncoveredFiles_HasIssues

      - id: ReviewMark-Config-PlanMarkdownDepth
        title: The ReviewMarkConfiguration unit shall apply the markdownDepth parameter to control
          the heading level in generated review plan documents, rejecting values above 5.
        justification: |
          The heading depth controls the section heading level in the generated plan document
          and must be within the supported range (1–5) so that subheadings do not exceed
          the maximum Markdown heading level of 6.
        tests:
          - ReviewMarkConfiguration_PublishReviewPlan_MarkdownDepth_UsedForHeadings
          - ReviewMarkConfiguration_PublishReviewPlan_MarkdownDepthAbove5_Throws

      - id: ReviewMark-Config-ReportGeneration
        title: The ReviewMarkConfiguration unit shall generate a Markdown review report listing
          each review-set and its current status.
        justification: |
          The tool must generate a Markdown review report document that lists every
          review-set with its current status (Current, Stale, Missing, or Failed).
        tests:
          - ReviewMarkConfiguration_PublishReviewReport_CurrentReview_NoIssues
          - ReviewMarkConfiguration_PublishReviewReport_StaleReview_HasIssues
          - ReviewMarkConfiguration_PublishReviewReport_FailedReview_HasIssues
          - ReviewMarkConfiguration_PublishReviewReport_MissingReview_HasIssues

      - id: ReviewMark-Config-ReportMarkdownDepth
        title: The ReviewMarkConfiguration unit shall apply the markdownDepth parameter to control
          the heading level in generated review report documents, rejecting values above 5.
        justification: |
          The heading depth controls the section heading level in the generated report document
          and must be within the supported range (1–5) so that subheadings do not exceed
          the maximum Markdown heading level of 6.
        tests:
          - ReviewMarkConfiguration_PublishReviewReport_MarkdownDepth_UsedForHeadings
          - ReviewMarkConfiguration_PublishReviewReport_MarkdownDepthAbove5_Throws

      - id: ReviewMark-Config-Elaboration
        title: The ReviewMarkConfiguration unit shall generate Markdown elaboration for a named
          review set, including its ID, fingerprint, and file list.
        justification: |
          The tool must generate a Markdown elaboration document for a named review-set,
          containing the review-set ID, title, fingerprint, and all matched files listed
          as inline code. Null, empty, or unrecognized review-set IDs must be rejected.
        tests:
          - ReviewMarkConfiguration_ElaborateReviewSet_ValidId_ReturnsElaboration
          - ReviewMarkConfiguration_ElaborateReviewSet_UnknownId_ThrowsArgumentException
          - ReviewMarkConfiguration_ElaborateReviewSet_NullId_ThrowsArgumentException
          - ReviewMarkConfiguration_ElaborateReviewSet_ContainsFullFingerprint

      - id: ReviewMark-Config-ElaborationMarkdownDepth
        title: The ReviewMarkConfiguration unit shall apply the markdownDepth parameter to control
          the heading level in generated elaboration documents, rejecting values above 5.
        justification: |
          The heading depth controls the heading level in the generated elaboration document
          and must be within the supported range (1–5) so that subheadings do not exceed
          the maximum Markdown heading level of 6.
        tests:
          - ReviewMarkConfiguration_ElaborateReviewSet_MarkdownDepth_UsedForHeadings
          - ReviewMarkConfiguration_ElaborateReviewSet_MarkdownDepthAbove5_Throws
