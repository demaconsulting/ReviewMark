---
# ReviewMark platform requirements
sections:
  - title: ReviewMark Requirements
    sections:
      - title: Platform Support Requirements
        requirements:
          - id: ReviewMark-Platform-Windows
            title: The tool shall build and run on Windows platforms.
            justification: |
              DEMA Consulting tools must support Windows as a major development platform.
            tests:
              # Test source pattern "windows@" ensures these tests ran on Windows.
              # This filtering is necessary to prove Windows OS functionality.
              - "windows@ReviewMark_VersionDisplay"
              - "windows@ReviewMark_HelpDisplay"
              - "windows@ReviewMark_ReviewPlanGeneration"
              - "windows@ReviewMark_ReviewReportGeneration"
              - "windows@ReviewMark_IndexScan"
              - "windows@ReviewMark_Enforce"
              - "windows@ReviewMark_WorkingDirectoryOverride"
              - "windows@ReviewMark_Elaborate"
              - "windows@ReviewMark_Lint"

          - id: ReviewMark-Platform-Linux
            title: The tool shall build and run on Linux platforms.
            justification: |
              DEMA Consulting tools must support Linux for CI/CD and containerized environments.
            tests:
              # Test source pattern "ubuntu@" ensures these tests ran on Linux.
              # This filtering is necessary to prove Linux OS functionality.
              - "ubuntu@ReviewMark_VersionDisplay"
              - "ubuntu@ReviewMark_HelpDisplay"
              - "ubuntu@ReviewMark_ReviewPlanGeneration"
              - "ubuntu@ReviewMark_ReviewReportGeneration"
              - "ubuntu@ReviewMark_IndexScan"
              - "ubuntu@ReviewMark_Enforce"
              - "ubuntu@ReviewMark_WorkingDirectoryOverride"
              - "ubuntu@ReviewMark_Elaborate"
              - "ubuntu@ReviewMark_Lint"

          - id: ReviewMark-Platform-MacOS
            title: The tool shall build and run on macOS platforms.
            justification: |
              DEMA Consulting tools must support macOS for developers using Apple platforms.
            tests:
              # Test source pattern "macos@" ensures these tests ran on macOS.
              # This filtering is necessary to prove macOS OS functionality.
              - "macos@ReviewMark_VersionDisplay"
              - "macos@ReviewMark_HelpDisplay"
              - "macos@ReviewMark_ReviewPlanGeneration"
              - "macos@ReviewMark_ReviewReportGeneration"
              - "macos@ReviewMark_IndexScan"
              - "macos@ReviewMark_Enforce"
              - "macos@ReviewMark_WorkingDirectoryOverride"
              - "macos@ReviewMark_Elaborate"
              - "macos@ReviewMark_Lint"

          - id: ReviewMark-Platform-Net8
            title: The tool shall support .NET 8 runtime.
            justification: |
              .NET 8 is an LTS release providing long-term stability for enterprise users.
            tests:
              # Test source pattern "dotnet8.x@" ensures these tests ran on .NET 8.
              # This filtering is necessary to prove .NET 8 runtime support.
              - "dotnet8.x@ReviewMark_VersionDisplay"
              - "dotnet8.x@ReviewMark_HelpDisplay"
              - "dotnet8.x@ReviewMark_ReviewPlanGeneration"
              - "dotnet8.x@ReviewMark_ReviewReportGeneration"
              - "dotnet8.x@ReviewMark_IndexScan"
              - "dotnet8.x@ReviewMark_Enforce"
              - "dotnet8.x@ReviewMark_WorkingDirectoryOverride"
              - "dotnet8.x@ReviewMark_Elaborate"
              - "dotnet8.x@ReviewMark_Lint"

          - id: ReviewMark-Platform-Net9
