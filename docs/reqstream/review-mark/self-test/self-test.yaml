---
# SelfTest Subsystem Requirements
#
# PURPOSE:
# - Define requirements for the ReviewMark SelfTest subsystem
# - The SelfTest subsystem spans Validation.cs (self-validation test execution)
# - Subsystem requirements describe the self-validation mechanism for tool qualification
#   in regulated environments

sections:
  - title: SelfTest Subsystem Requirements
    requirements:
      - id: ReviewMark-SelfTest-Qualification
        title: The tool shall provide a self-validation mechanism to qualify the tool in its deployment environment.
        justification: |
          In regulated environments, tool qualification evidence is required to demonstrate
          that the tool functions correctly in its deployment environment before it is used
          to generate compliance artifacts. The SelfTest subsystem provides a built-in
          self-validation suite that exercises core behaviors and produces a pass/fail
          summary, enabling quality assurance teams to obtain tool qualification evidence
          without requiring a separate test harness.
        tests:
          - SelfTest_Run_AllTestsPass_ExitCodeIsZero
        children: [ReviewMark-Validation-Run]

      - id: ReviewMark-SelfTest-ResultsOutput
        title: >-
          The tool shall write self-validation results to a TRX (MSTest) or JUnit XML
          file when --results is provided.
        justification: |
          CI/CD pipelines and requirements traceability tools (such as ReqStream) consume
          test result files in standard formats. By supporting both TRX (MSTest) and JUnit
          XML output, the SelfTest subsystem enables self-validation results to be fed
          directly into pipeline tooling and traceability reports without additional
          conversion steps, satisfying audit trail requirements.
        tests:
          - SelfTest_Run_GeneratesResultsFile
          - SelfTest_Run_GeneratesJUnitResultsFile
        children: [ReviewMark-Validation-ResultsFile]

      - id: ReviewMark-SelfTest-ExitCodeOnFailure
        title: The tool shall set the process exit code to 1 when any validation error occurs during self-validation.
        justification: |
          Callers such as CI/CD pipelines and automated qualification scripts rely on
          the process exit code to determine whether tool qualification succeeded.
          A non-zero exit code on any validation error (including test failures and
          results output errors) ensures that a broken deployment environment is
          detected without requiring inspection of the output text.
        tests:
          - SelfTest_Run_UnsupportedResultsFormat_ExitCodeIsNonZero
        children: [ReviewMark-Validation-Run]

      - id: ReviewMark-SelfTest-ConsoleSummary
        title: >-
          The tool shall write a human-readable summary of pass and fail counts to
          the console after running self-validation.
        justification: |
          Operators running self-validation manually need an immediate summary of the
          results without parsing machine-readable output. A console summary including
          total, passed, and failed counts provides an at-a-glance status that lets
          operators quickly confirm that qualification succeeded or identify how many
          tests require investigation.
        tests:
          - SelfTest_Run_AllTestsPass_ExitCodeIsZero
        children: [ReviewMark-Validation-Run]
