---
# ReviewMark System-Level Requirements
#
# PURPOSE:
# - Define system-level requirements describing what end-users need the ReviewMark tool to provide
# - These requirements capture the externally visible behavior of the complete ReviewMark system
# - Unit-level requirements (per-class behavior) are in the individual *-requirements.yaml files

sections:
  - title: System-Level Requirements
    requirements:
      - id: ReviewMark-System-ReviewPlan
        title: >-
          The tool shall generate a Review Plan document listing all files requiring review and their
          review-set coverage.
        justification: |
          In regulated environments, auditors require evidence that every file subject to review
          is covered by at least one named review-set. The Review Plan document provides this
          evidence automatically on each CI/CD run, replacing manual tracking spreadsheets.
        tests:
          - ReviewMark_PlanFlag_WithDefinitionFile_GeneratesReviewPlan
        children:
          - ReviewMark-Cmd-Plan
          - ReviewMark-Configuration-NeedsReview
          - ReviewMark-Configuration-PlanGeneration

      - id: ReviewMark-System-ReviewReport
        title: The tool shall generate a Review Report document listing every review-set and its current review status.
        justification: |
          Auditors need evidence that the review evidence for each review-set is current —
          that the reviewed files have not changed since the review was conducted. The Review
          Report provides this evidence automatically, showing Current, Stale, Missing, or
          Failed status for each review-set.
        tests:
          - ReviewMark_ReportFlag_WithDefinitionFile_GeneratesReviewReport
        children:
          - ReviewMark-Cmd-Report
          - ReviewMark-Configuration-Fingerprinting
          - ReviewMark-Configuration-ReportGeneration
          - ReviewMark-Indexing-LoadEvidence

      - id: ReviewMark-System-Enforce
        title: The tool shall return a non-zero exit code when enforcement is enabled and any review-set is not current.
        justification: |
          CI/CD pipelines must be able to gate releases on review coverage. The --enforce flag
          enables this by causing the tool to exit with a non-zero code in two situations: when
          the Review Plan shows that files matching needs-review are not covered by any
          review-set, or when the Review Report shows that any review-set has Stale, Missing, or
          Failed status. This makes incomplete file coverage, out-of-date reviews, and failed
          reviews all build-breaking conditions.
        tests:
          - ReviewMark_EnforceFlag_WithNoEvidence_ReturnsNonZero
        children:
          - ReviewMark-Cmd-Enforce
          - ReviewMark-Program-HandleIssues-Enforce
          - ReviewMark-Program-HandleIssues-Warn

      - id: ReviewMark-System-Credentials
        title: The tool shall support authenticated URL evidence sources via username-env and password-env credentials.
        justification: |
          Teams that host their evidence index on a secured HTTP(S) server must be able to
          provide credentials so that ReviewMark can download the index without manual
          intervention. Reading credentials from environment variables (username-env and
          password-env) avoids storing secrets in the configuration file and integrates
          cleanly with CI/CD secret management.
        tests:
          - ReviewMark_LintFlag_WithValidConfig_ProducesNoOutput
        children:
          - ReviewMark-Index-EvidenceSource

      - id: ReviewMark-System-IndexScan
        title: The tool shall scan PDF evidence files and write an index.json when the --index flag is provided.
        justification: |
          Review evidence PDFs contain embedded metadata (id, fingerprint, date, result) in their
          Keywords field. The --index command scans a directory of such PDFs and writes an
          index.json, enabling the evidence store to be refreshed after new review PDFs are added
          without manual maintenance of the index file.
        tests:
          - ReviewMark_IndexFlag_OnEmptyDirectory_CreatesIndexJson
        children:
          - ReviewMark-Cmd-Index
          - ReviewMark-Indexing-SafePathCombine
          - ReviewMark-Indexing-ScanPdfEvidence
          - ReviewMark-Indexing-Save
          - ReviewMark-Program-Index

      - id: ReviewMark-System-IndexScan-Repeat
        title: >-
          The tool shall accept multiple --index flags in a single invocation to scan
          evidence organized across multiple directories.
        justification: |
          Review evidence PDFs may be organized across several sub-directories. Supporting
          repeated --index flags allows users to aggregate evidence from all relevant
          locations into a single index.json without requiring separate tool invocations
          or manual merging.
        tests:
          - ReviewMark_IndexFlag_WithRepeat_ScansAllPaths
        children:
          - ReviewMark-Cmd-Index
          - ReviewMark-Program-Index

      - id: ReviewMark-System-Validate
        title: The tool shall execute self-validation tests when the --validate flag is provided.
        justification: |
          Regulated environments require tool qualification evidence to demonstrate that the tool
          functions correctly in its specific deployment environment. The --validate flag triggers
          a built-in test suite that exercises core tool behaviors and produces a pass/fail report.
        tests:
          - ReviewMark_ValidateFlag_Invoked_RunsValidation
        children:
          - ReviewMark-Cmd-Validate
          - ReviewMark-SelfTest-Qualification
          - ReviewMark-SelfTest-ExitCodeOnFailure
          - ReviewMark-SelfTest-ConsoleSummary

      - id: ReviewMark-System-Version
        title: The tool shall display the version string when the --version flag is provided.
        justification: |
          Users need to quickly identify the version of the tool they are using for
          troubleshooting and compatibility verification.
        tests:
          - ReviewMark_VersionFlag_Invoked_OutputsVersion
        children:
          - ReviewMark-Cmd-Version
          - ReviewMark-Program-Dispatch

      - id: ReviewMark-System-Help
        title: The tool shall display usage information when the --help flag is provided.
        justification: |
          Users need access to command-line usage documentation without requiring external resources.
        tests:
          - ReviewMark_HelpFlag_Invoked_OutputsUsageInformation
        children:
          - ReviewMark-Cmd-Help

      - id: ReviewMark-System-WorkingDirectory
        title: The tool shall support a --dir flag to set the working directory for file operations.
        justification: |
          Allows users to target an evidence store or project directory without changing
          the process working directory, enabling consistent scripting and CI/CD usage.
        tests:
          - ReviewMark_DirFlag_Invoked_OverridesWorkingDirectory
        children:
          - ReviewMark-Cmd-Dir

      - id: ReviewMark-System-Elaborate
        title: The tool shall print a Markdown elaboration of a review set when --elaborate is provided.
        justification: |
          When preparing for a review, the reviewer needs the review set ID, its title,
          its current fingerprint, and the full sorted list of files to be reviewed.
        tests:
          - ReviewMark_ElaborateFlag_WithValidId_OutputsElaboration
        children:
          - ReviewMark-Cmd-Elaborate
          - ReviewMark-Configuration-Elaboration
          - ReviewMark-Configuration-ElaborateUnknownId

      - id: ReviewMark-System-LintValidation
        title: The tool shall validate the definition file and report only issue messages when --lint is provided.
        justification: |
          Users need a way to verify that the .reviewmark.yaml configuration file is valid
          before running the main tool. Reporting only the issue messages (not a banner or
          summary) keeps the output suitable for direct use in linting scripts and CI pipelines.
        tests:
          - ReviewMark_LintFlag_WithValidConfig_ProducesNoOutput
          - ReviewMark_LintFlag_WithInvalidConfig_ReportsIssueMessages
        children:
          - ReviewMark-Cmd-Lint
          - ReviewMark-Program-LintVerbosity

      - id: ReviewMark-System-LintSilenceOnSuccess
        title: The tool shall produce no output when --lint succeeds (exit code 0).
        justification: |
          Suppressing all output on successful lint (silence-on-success) allows the exit code
          alone to signal whether the file is valid. This follows the Unix convention and
          improves integration with linting scripts and CI pipelines.
        tests:
          - ReviewMark_LintFlag_WithValidConfig_ProducesNoOutput
        children:
          - ReviewMark-Cmd-Lint
          - ReviewMark-Program-LintVerbosity

      - id: ReviewMark-System-Silent
        title: The tool shall support --silent flag to suppress console output.
        justification: |
          Enables automated scripts and CI/CD pipelines to run the tool without cluttering
          output logs when only the exit code is needed.
        tests:
          - ReviewMark_SilentFlag_Invoked_SuppressesOutput
        children:
          - ReviewMark-Cmd-Silent

      - id: ReviewMark-System-Log
        title: The tool shall support --log flag to write output to a persistent log file.
        justification: |
          Provides persistent logging for debugging and audit trails when running in CI/CD
          environments where console output may not be captured.
        tests:
          - ReviewMark_LogFlag_Invoked_WritesOutputToFile
        children:
          - ReviewMark-Cmd-Log

      - id: ReviewMark-System-Depth
        title: >-
          The tool shall apply the --depth flag as the default Markdown heading depth
          for all generated documents.
        justification: |
          Allows users to set the heading depth once and have it apply to the review plan,
          review report, and self-validation report. Default depth is 1 when not specified.
        tests:
          - ReviewMark_DepthFlag_Invoked_SetsDefaultHeadingDepth
          - ReviewMark_DepthFlag_WithValidate_SetsValidationHeadingDepth
        children:
          - ReviewMark-Cmd-Depth

      - id: ReviewMark-System-PlanDepth
        title: >-
          The tool shall apply the --plan-depth flag to override the Markdown heading depth
          for the review plan document only.
        justification: |
          Allows the review plan to be embedded at any heading level within a larger Markdown
          document, overriding the --depth default when specified. Default depth is 1 when
          neither --plan-depth nor --depth is specified.
        tests:
          - ReviewMark_DepthFlag_Invoked_SetsDefaultHeadingDepth
          - ReviewMark_PlanDepthFlag_Invoked_OverridesPlanHeadingOnly
        children:
          - ReviewMark-Cmd-PlanDepth

      - id: ReviewMark-System-ReportDepth
        title: >-
          The tool shall apply the --report-depth flag to override the Markdown heading depth
          for the review report document only.
        justification: |
          Allows the review report to be embedded at any heading level within a larger Markdown
          document, overriding the --depth default when specified. Default depth is 1 when
          neither --report-depth nor --depth is specified.
        tests:
          - ReviewMark_DepthFlag_Invoked_SetsDefaultHeadingDepth
          - ReviewMark_ReportDepthFlag_Invoked_OverridesReportHeadingOnly
        children:
          - ReviewMark-Cmd-ReportDepth

      - id: ReviewMark-System-InvalidArgs
        title: The tool shall reject unknown command-line arguments with a non-zero exit code.
        justification: |
          Providing clear feedback for invalid arguments helps users quickly correct mistakes
          and prevents silent misconfiguration in automated environments.
        tests:
          - ReviewMark_UnknownArgument_Provided_ReturnsNonZeroAndError
        children:
          - ReviewMark-Cmd-InvalidArgs
          - ReviewMark-Cmd-ErrorOutput
          - ReviewMark-Cmd-ExitCode
          - ReviewMark-Program-ParseArguments
          - ReviewMark-Program-ExitCode

      - id: ReviewMark-System-Results
        title: The tool shall write validation results to a standard test result file when --results is provided.
        justification: |
          Enables integration with CI/CD systems and requirements traceability tools that
          expect standard TRX or JUnit XML test result formats.
        tests:
          - ReviewMark_ValidateFlag_WithTrxResultsPath_GeneratesTrxFile
          - ReviewMark_ValidateFlag_WithXmlResultsPath_GeneratesJUnitFile
        children:
          - ReviewMark-Cmd-Results
          - ReviewMark-SelfTest-ResultsOutput-Trx
          - ReviewMark-SelfTest-ResultsOutput-Junit

      - id: ReviewMark-System-Definition
        title: The tool shall support a --definition flag to specify the path to the definition YAML file.
        justification: |
          Users may need to specify a non-default path to the .reviewmark.yaml configuration file,
          for example when targeting a different project directory or using a non-standard file name.
          The --definition flag enables ReviewMark to be used with multiple configurations in the
          same repository or CI/CD pipeline.
        tests:
          - ReviewMark_PlanFlag_WithDefinitionFile_GeneratesReviewPlan
        children:
          - ReviewMark-Cmd-Definition
          - ReviewMark-Configuration-MalformedYaml

      - id: ReviewMark-System-CrossPlatform
        title: The tool shall run on Windows, Linux, and macOS with .NET 8, 9, and 10.
        justification: |
          DEMA Consulting tools must run on all major operating systems and current .NET
          runtimes so that teams can use ReviewMark regardless of their development or CI/CD
          platform. Supporting .NET 8 (LTS), 9, and 10 ensures long-term compatibility and
          access to the latest runtime features.
        tests:
          - ReviewMark_VersionFlag_Invoked_OutputsVersion
        children:
          - ReviewMark-Platform-Windows
          - ReviewMark-Platform-Linux
          - ReviewMark-Platform-MacOS
          - ReviewMark-Platform-Net8
          - ReviewMark-Platform-Net9
          - ReviewMark-Platform-Net10

      - id: ReviewMark-System-ExecutionContext
        title: The tool shall parse command-line arguments into a structured execution context and maintain execution state
          for the duration of the operation.
        justification: |
          All downstream processing must read from a single, validated source of truth
          derived from the command-line arguments, and all output channels and exit-code
          state must be managed consistently for the full duration of an invocation. This
          ensures predictable, auditable behavior in both interactive and CI/CD environments.
        tests:
          - ReviewMark_VersionFlag_Invoked_OutputsVersion
          - ReviewMark_UnknownArgument_Provided_ReturnsNonZeroAndError
        children:
          - ReviewMark-Cmd-Context
          - ReviewMark-Cmd-ExecutionState
