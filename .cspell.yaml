---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: '0.2'

language: en

# Project-specific technical terms and tool names
words:
  - buildmark
  - CIFS
  - Dema
  - fileassert
  - fileshare
  - hotspots
  - mstest
  - nendobj
  - nstartxref
  - pandoc
  - pdfsharp
  - Pdfs
  - planfile
  - postconditions
  - Qube
  - reportfile
  - reqstream
  - rethrowing
  - reviewmark
  - Sarif
  - sarifmark
  - selftest
  - sonarmark
  - unreviewed
  - versionmark
  - weasy
  - weasyprint
  - xunit
  - yamlfix
  - yamldotnet

ignorePaths:
  - '**/.git/**'
  - '**/node_modules/**'
  - '**/.venv/**'
  - '**/thirdparty/**'
  - '**/third-party/**'
  - '**/3rd-party/**'
  - '**/.agent-logs/**'
  - '**/bin/**'
  - '**/obj/**'
  - '**/generated/**'
  - package-lock.json
