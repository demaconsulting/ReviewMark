# Requirements Testing Strategy
#
# This project uses three categories of tests to verify requirements:
#
# 1. Unit Tests - Run locally via "dotnet test"
# 2. Self-Validation Tests - Run locally via "--validate"
# 3. Platform Tests - Run via CI/CD across OS/runtime matrix
#
# NOTE: Running "reqstream --enforce" with only local test results (unit tests
# and local self-validation) is expected to show some unsatisfied requirements.
# Platform-specific requirements require test results from CI/CD runs across
# the full OS and runtime matrix.
#
# Test links can include a source filter prefix (e.g. "windows@", "ubuntu@", "net8.0@",
# "dotnet8.x@") to restrict which test results count as evidence for a requirement. This
# is critical for platform and framework requirements - removing these filters invalidates
# the evidence-based proof.
#
# Source filter prefixes:
#   windows@TestName    - proves the test passed on a Windows platform
#   ubuntu@TestName     - proves the test passed on a Linux (Ubuntu) platform
#   macos@TestName      - proves the test passed on a macOS platform
#   net8.0@TestName     - proves the test passed under the .NET 8 target framework
#   net9.0@TestName     - proves the test passed under the .NET 9 target framework
#   net10.0@TestName    - proves the test passed under the .NET 10 target framework
#   dotnet8.x@TestName  - proves the self-validation test ran with .NET 8.x runtime
#   dotnet9.x@TestName  - proves the self-validation test ran with .NET 9.x runtime
#   dotnet10.x@TestName - proves the self-validation test ran with .NET 10.x runtime
#
---
sections:
  - title: ReviewMark Requirements
    sections:
      - title: Command-Line Interface
        requirements:
          - id: ReviewMark-Cmd-Context
            title: The tool shall implement a Context class for command-line argument handling.
            justification: |
              Provides a standardized approach to command-line argument parsing and output
              handling across all DEMA Consulting DotNet Tools.
            tests:
              - Context_Create_NoArguments_ReturnsDefaultContext
              - Context_Create_VersionFlag_SetsVersionTrue
              - Context_Create_HelpFlag_SetsHelpTrue
              - Context_Create_SilentFlag_SetsSilentTrue
              - Context_Create_ValidateFlag_SetsValidateTrue
              - Context_Create_ResultsFlag_SetsResultsFile
              - Context_Create_LogFlag_OpensLogFile

          - id: ReviewMark-Cmd-Version
            title: The tool shall support -v and --version flags to display version information.
            justification: |
              Users need to quickly identify the version of the tool they are using for
              troubleshooting and compatibility verification.
            tests:
              - Context_Create_VersionFlag_SetsVersionTrue
              - Context_Create_ShortVersionFlag_SetsVersionTrue
              - Program_Run_WithVersionFlag_DisplaysVersionOnly
              - Program_Version_ReturnsNonEmptyString
              - IntegrationTest_VersionFlag_OutputsVersion

          - id: ReviewMark-Cmd-Help
            title: The tool shall support -?, -h, and --help flags to display usage information.
            justification: |
              Users need access to command-line usage documentation without requiring
              external resources.
            tests:
              - Context_Create_HelpFlag_SetsHelpTrue
              - Context_Create_ShortHelpFlag_H_SetsHelpTrue
              - Context_Create_ShortHelpFlag_Question_SetsHelpTrue
              - Program_Run_WithHelpFlag_DisplaysUsageInformation
              - IntegrationTest_HelpFlag_OutputsUsageInformation

          - id: ReviewMark-Cmd-Silent
            title: The tool shall support --silent flag to suppress console output.
            justification: |
              Enables automated scripts and CI/CD pipelines to run the tool without
              cluttering output logs.
            tests:
              - Context_Create_SilentFlag_SetsSilentTrue
              - Context_WriteLine_Silent_DoesNotWriteToConsole
              - IntegrationTest_SilentFlag_SuppressesOutput

          - id: ReviewMark-Cmd-Validate
            title: The tool shall support --validate flag to run self-validation tests.
            justification: |
              Provides a built-in mechanism to verify the tool is functioning correctly
              in the deployment environment.
            tests:
              - Context_Create_ValidateFlag_SetsValidateTrue
              - Program_Run_WithValidateFlag_RunsValidation
              - IntegrationTest_ValidateFlag_RunsValidation

          - id: ReviewMark-Cmd-Results
            title: The tool shall support --results flag to write validation results in TRX or JUnit format.
            justification: |
              Enables integration with CI/CD systems that expect standard test result formats.
            tests:
              - Context_Create_ResultsFlag_SetsResultsFile
              - IntegrationTest_ValidateWithResults_GeneratesTrxFile
              - IntegrationTest_ValidateWithResults_GeneratesJUnitFile

          - id: ReviewMark-Cmd-Log
            title: The tool shall support --log flag to write output to a log file.
            justification: |
              Provides persistent logging for debugging and audit trails.
            tests:
              - Context_Create_LogFlag_OpensLogFile
              - IntegrationTest_LogFlag_WritesOutputToFile

          - id: ReviewMark-Cmd-ErrorOutput
            title: The tool shall write error messages to stderr.
            justification: |
              Error messages must be written to stderr so they remain visible to the user
              without polluting stdout, which consumers may pipe or redirect for data capture.
            tests:
              - Context_WriteError_NotSilent_WritesToConsole
              - IntegrationTest_UnknownArgument_ReturnsError

          - id: ReviewMark-Cmd-InvalidArgs
            title: The tool shall reject unknown or malformed command-line arguments with a descriptive error.
            justification: |
              Providing clear feedback for invalid arguments helps users quickly correct
              mistakes and prevents silent misconfiguration.
            tests:
              - Context_Create_UnknownArgument_ThrowsArgumentException
              - Context_Create_LogFlag_WithoutValue_ThrowsArgumentException
              - Context_Create_ResultsFlag_WithoutValue_ThrowsArgumentException
              - IntegrationTest_UnknownArgument_ReturnsError

          - id: ReviewMark-Cmd-ExitCode
            title: The tool shall return a non-zero exit code on failure.
            justification: |
              Callers (scripts, CI/CD pipelines) must be able to detect failure conditions
              programmatically via the process exit code.
            tests:
              - Context_WriteError_SetsErrorExitCode
              - IntegrationTest_UnknownArgument_ReturnsError

          - id: ReviewMark-Cmd-Definition
            title: The tool shall support --definition flag to specify the definition YAML file.
            justification: |
              Users must be able to specify the path to the .reviewmark.yaml definition file,
              which configures needs-review patterns, evidence source, and review set definitions.
            tests:
              - Context_Create_DefinitionFlag_SetsDefinitionFile
              - Context_Create_DefinitionFlag_WithoutValue_ThrowsArgumentException
              - ReviewMark_DefinitionPlan
              - ReviewMark_DefinitionReport

          - id: ReviewMark-Cmd-Plan
            title: The tool shall support --plan flag to write the review plan to a Markdown file.
            justification: |
              Enables automated generation of a review plan document that lists all review sets
              and coverage status, suitable for inclusion in release documentation.
            tests:
              - Context_Create_PlanFlag_SetsPlanFile
              - ReviewMark_DefinitionPlan

          - id: ReviewMark-Cmd-PlanDepth
            title: The tool shall support --plan-depth flag to set the Markdown heading depth for the review plan.
            justification: |
              Allows the review plan to be embedded at any heading level within a larger
              Markdown document, with a default depth of 1 when not specified.
            tests:
              - Context_Create_PlanDepthFlag_SetsPlanDepth
              - Context_Create_PlanDepthFlag_WithInvalidValue_ThrowsArgumentException
              - Context_Create_PlanDepthFlag_WithZeroValue_ThrowsArgumentException
              - Context_Create_NoArguments_PlanDepthDefaultsToOne

          - id: ReviewMark-Cmd-Report
            title: The tool shall support --report flag to write the review report to a Markdown file.
            justification: |
              Enables automated generation of a review report document showing the current
              status of each review set against the evidence index, suitable for release documentation.
            tests:
              - Context_Create_ReportFlag_SetsReportFile
              - ReviewMark_DefinitionReport

          - id: ReviewMark-Cmd-ReportDepth
            title: The tool shall support --report-depth flag to set the Markdown heading depth for the review report.
            justification: |
              Allows the review report to be embedded at any heading level within a larger
              Markdown document, with a default depth of 1 when not specified.
            tests:
              - Context_Create_ReportDepthFlag_SetsReportDepth
              - Context_Create_NoArguments_ReportDepthDefaultsToOne

          - id: ReviewMark-Cmd-Index
            title: The tool shall support --index flag to scan PDF evidence files matching a glob path and write
              index.json.
            justification: |
              Provides a mechanism to regenerate the review evidence index from scanned PDF
              files, reading embedded metadata from each PDF's Keywords field to populate
              the index with review IDs, fingerprints, dates, results, and file names.
            tests:
              - Context_Create_IndexFlag_AddsIndexPath
              - Context_Create_IndexFlag_MultipleTimes_AddsAllPaths
              - Context_Create_NoArguments_IndexPathsEmpty
              - ReviewMark_IndexScan

          - id: ReviewMark-Cmd-Enforce
            title: The tool shall support --enforce flag to exit with a non-zero code when there are review issues.
            justification: |
              Enables CI/CD pipelines to block downstream stages when review sets are failed,
              stale, or missing, or when files requiring review are not covered by any review-set.
              Without --enforce the tool generates the plan and report but exits with code 0.
            tests:
              - Context_Create_EnforceFlag_SetsEnforceTrue
              - Context_Create_NoArguments_EnforceFalse
              - ReviewMark_Enforce

          - id: ReviewMark-Cmd-Dir
            title: The tool shall support --dir flag to set the working directory for file operations.
            justification: |
              Allows users to target an evidence store or project directory without changing
              the process working directory, enabling consistent scripting and CI/CD usage
              without requiring a cd command before invoking the tool.
            tests:
              - Context_Create_DirFlag_SetsWorkingDirectory
              - Context_Create_NoArguments_WorkingDirectoryIsNull
              - Context_Create_DirFlag_MissingValue_ThrowsArgumentException
              - ReviewMark_Dir

      - title: Configuration Reading
        requirements:
          - id: ReviewMark-Config-Reading
            title: The tool shall read and parse the .reviewmark.yaml file into an in-memory configuration model.
            justification: |
              Enables the tool to read its configuration from the standard `.reviewmark.yaml` file,
              exposing needs-review patterns, evidence source, and review set definitions. Review sets
              support SHA256 content-based fingerprinting to detect changes to covered files.
            tests:
              - ReviewMarkConfiguration_Parse_NullYaml_ThrowsArgumentNullException
              - ReviewMarkConfiguration_Parse_ValidYaml_ReturnsConfiguration
              - ReviewMarkConfiguration_Parse_NeedsReviewPatterns_ParsedCorrectly
              - ReviewMarkConfiguration_Parse_EvidenceSource_ParsedCorrectly
              - ReviewMarkConfiguration_Parse_Reviews_ParsedCorrectly
              - ReviewMarkConfiguration_Parse_EvidenceSourceWithCredentials_ParsedCorrectly
              - ReviewMarkConfiguration_GetNeedsReviewFiles_ReturnsMatchingFiles
              - ReviewSet_GetFingerprint_SameContent_ReturnsSameFingerprint
              - ReviewSet_GetFingerprint_DifferentContent_ReturnsDifferentFingerprint
              - ReviewSet_GetFingerprint_RenameFile_ReturnsSameFingerprint
              - ReviewMarkConfiguration_Load_NonExistentFile_ThrowsException

          - id: ReviewMark-Index-EvidenceSource
            title: The tool shall load a ReviewIndex from an EvidenceSource supporting fileshare and url types.
            justification: |
              The tool must be able to load review evidence index data from the EvidenceSource
              specified in its configuration. Two source types are supported: `fileshare` loads
              the index JSON from a local or network file path, and `url` downloads it over
              HTTP(S) with optional Basic-auth credentials read from environment variables.
              An internal overload accepting an HttpClient enables unit testing via a fake
              HttpMessageHandler without network access.
            tests:
              - ReviewIndex_Load_EvidenceSource_NullSource_ThrowsArgumentNullException
              - ReviewIndex_Load_EvidenceSource_UnknownType_ThrowsInvalidOperationException
              - ReviewIndex_Load_EvidenceSource_Fileshare_LoadsFromFile
              - ReviewIndex_Load_EvidenceSource_Fileshare_NonExistentFile_ThrowsInvalidOperationException
              - ReviewIndex_Load_EvidenceSource_Fileshare_InvalidJson_ThrowsInvalidOperationException
              - ReviewIndex_Load_EvidenceSource_Fileshare_EmptyReviews_ReturnsEmptyIndex
              - ReviewIndex_Load_EvidenceSource_Fileshare_ValidJson_ReturnsPopulatedIndex
              - ReviewIndex_Load_EvidenceSource_Fileshare_MissingRequiredFields_SkipsInvalidEntries
              - ReviewIndex_Load_EvidenceSource_Url_SuccessResponse_LoadsIndex
              - ReviewIndex_Load_EvidenceSource_Url_NotFoundResponse_ThrowsInvalidOperationException
              - ReviewIndex_Load_EvidenceSource_Url_InvalidJson_ThrowsInvalidOperationException
              - ReviewIndex_Load_EvidenceSource_NullHttpClient_ThrowsArgumentNullException

      - title: Platform Support
        requirements:
          - id: ReviewMark-Platform-Windows
            title: The tool shall build and run on Windows platforms.
            justification: |
              DEMA Consulting tools must support Windows as a major development platform.
            tests:
              # Tests link to "windows" to ensure results come from Windows platform
              - "windows@ReviewMark_VersionDisplay"
              - "windows@ReviewMark_HelpDisplay"
              - "windows@ReviewMark_DefinitionPlan"
              - "windows@ReviewMark_DefinitionReport"
              - "windows@ReviewMark_IndexScan"
              - "windows@ReviewMark_Enforce"

          - id: ReviewMark-Platform-Linux
            title: The tool shall build and run on Linux platforms.
            justification: |
              DEMA Consulting tools must support Linux for CI/CD and containerized environments.
            tests:
              # Tests link to "ubuntu" to ensure results come from Linux platform
              - "ubuntu@ReviewMark_VersionDisplay"
              - "ubuntu@ReviewMark_HelpDisplay"
              - "ubuntu@ReviewMark_DefinitionPlan"
              - "ubuntu@ReviewMark_DefinitionReport"
              - "ubuntu@ReviewMark_IndexScan"
              - "ubuntu@ReviewMark_Enforce"

          - id: ReviewMark-Platform-MacOS
            title: The tool shall build and run on macOS platforms.
            justification: |
              DEMA Consulting tools must support macOS for developers using Apple platforms.
            tests:
              # Tests link to "macos" to ensure results come from macOS platform
              - "macos@ReviewMark_VersionDisplay"
              - "macos@ReviewMark_HelpDisplay"
              - "macos@ReviewMark_DefinitionPlan"
              - "macos@ReviewMark_DefinitionReport"
              - "macos@ReviewMark_IndexScan"
              - "macos@ReviewMark_Enforce"

          - id: ReviewMark-Platform-Net8
            title: The tool shall support .NET 8 runtime.
            justification: |
              .NET 8 is an LTS release providing long-term stability for enterprise users.
            tests:
              - "dotnet8.x@ReviewMark_VersionDisplay"
              - "dotnet8.x@ReviewMark_HelpDisplay"
              - "dotnet8.x@ReviewMark_DefinitionPlan"
              - "dotnet8.x@ReviewMark_DefinitionReport"
              - "dotnet8.x@ReviewMark_IndexScan"
              - "dotnet8.x@ReviewMark_Enforce"

          - id: ReviewMark-Platform-Net9
            title: The tool shall support .NET 9 runtime.
            justification: |
              .NET 9 support enables users to leverage the latest .NET features.
            tests:
              - "dotnet9.x@ReviewMark_VersionDisplay"
              - "dotnet9.x@ReviewMark_HelpDisplay"
              - "dotnet9.x@ReviewMark_DefinitionPlan"
              - "dotnet9.x@ReviewMark_DefinitionReport"
              - "dotnet9.x@ReviewMark_IndexScan"
              - "dotnet9.x@ReviewMark_Enforce"

          - id: ReviewMark-Platform-Net10
            title: The tool shall support .NET 10 runtime.
            justification: |
              .NET 10 support ensures the tool remains compatible with the latest .NET ecosystem.
            tests:
              - "dotnet10.x@ReviewMark_VersionDisplay"
              - "dotnet10.x@ReviewMark_HelpDisplay"
              - "dotnet10.x@ReviewMark_DefinitionPlan"
              - "dotnet10.x@ReviewMark_DefinitionReport"
              - "dotnet10.x@ReviewMark_IndexScan"
              - "dotnet10.x@ReviewMark_Enforce"

      - title: OTS Software
        requirements:
          - id: ReviewMark-OTS-MSTest
            title: MSTest shall execute unit tests and report results.
            justification: |
              MSTest (MSTest.TestFramework and MSTest.TestAdapter) is the unit-testing framework used
              by the project. It discovers and runs all test methods and writes TRX result files that
              feed into coverage reporting and requirements traceability. Passing tests confirm the
              framework is functioning correctly.
            tags: [ots]
            tests:
              - Context_Create_NoArguments_ReturnsDefaultContext
              - Context_Create_VersionFlag_SetsVersionTrue
              - Context_Create_HelpFlag_SetsHelpTrue
              - Context_Create_SilentFlag_SetsSilentTrue
              - Context_Create_ValidateFlag_SetsValidateTrue
              - Context_Create_ResultsFlag_SetsResultsFile
              - Context_Create_LogFlag_OpensLogFile
              - Context_Create_UnknownArgument_ThrowsArgumentException
              - Context_Create_ShortVersionFlag_SetsVersionTrue

          - id: ReviewMark-OTS-ReqStream
            title: ReqStream shall enforce that every requirement is linked to passing test evidence.
            justification: |
              DemaConsulting.ReqStream processes requirements.yaml and the TRX test-result files to
              produce a requirements report, justifications document, and traceability matrix. When
              run with --enforce, it exits with a non-zero code if any requirement lacks test evidence,
              making unproven requirements a build-breaking condition. A successful pipeline run with
              --enforce proves all requirements are covered and that ReqStream is functioning.
            tags: [ots]
            tests:
              - ReqStream_EnforcementMode

          - id: ReviewMark-OTS-BuildMark
            title: BuildMark shall generate build-notes documentation from GitHub Actions metadata.
            justification: |
              DemaConsulting.BuildMark queries the GitHub API to capture workflow run details and
              renders them as a markdown build-notes document included in the release artifacts.
              It runs as part of the same CI pipeline that produces the TRX test results, so a
              successful pipeline run is evidence that BuildMark executed without error.
            tags: [ots]
            tests:
              - BuildMark_MarkdownReportGeneration

          - id: ReviewMark-OTS-VersionMark
            title: VersionMark shall publish captured tool-version information.
            justification: |
              DemaConsulting.VersionMark reads version metadata for each dotnet tool used in the
              pipeline and writes a versions markdown document included in the release artifacts.
              It runs in the same CI pipeline that produces the TRX test results, so a successful
              pipeline run is evidence that VersionMark executed without error.
            tags: [ots]
            tests:
              - VersionMark_CapturesVersions
              - VersionMark_GeneratesMarkdownReport

          - id: ReviewMark-OTS-SarifMark
            title: SarifMark shall convert CodeQL SARIF results into a markdown report.
            justification: |
              DemaConsulting.SarifMark reads the SARIF output produced by CodeQL code scanning and
              renders it as a human-readable markdown document included in the release artifacts.
              It runs in the same CI pipeline that produces the TRX test results, so a successful
              pipeline run is evidence that SarifMark executed without error.
            tags: [ots]
            tests:
              - SarifMark_SarifReading
              - SarifMark_MarkdownReportGeneration

          - id: ReviewMark-OTS-SonarMark
            title: SonarMark shall generate a SonarCloud quality report.
            justification: |
              DemaConsulting.SonarMark retrieves quality-gate and metrics data from SonarCloud and
              renders it as a markdown document included in the release artifacts. It runs in the
              same CI pipeline that produces the TRX test results, so a successful pipeline run is
              evidence that SonarMark executed without error.
            tags: [ots]
            tests:
              - SonarMark_QualityGateRetrieval
              - SonarMark_IssuesRetrieval
              - SonarMark_HotSpotsRetrieval
              - SonarMark_MarkdownReportGeneration
