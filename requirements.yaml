# Root Requirements File
#
# PURPOSE:
# - Serve as the entry point for ReqStream requirement processing
# - Include all reviewable requirement files from docs/reqstream/
#
# USAGE:
# - Run ReqStream against this file to process all requirements:
#
#   dotnet reqstream \
#     --requirements requirements.yaml \
#     --tests "artifacts/**/*.trx" \
#     --report docs/requirements_doc/requirements.md \
#     --justifications docs/requirements_doc/justifications.md \
#     --matrix docs/requirements_report/trace_matrix.md \
#     --enforce
#
# - Add new requirement files under docs/reqstream/ and include them here
#
# NOTE: Test links can include a source filter prefix (e.g. "windows@", "ubuntu@", "net8.0@",
# "dotnet8.x@") to restrict which test results count as evidence for a requirement. This
# is critical for platform and framework requirements - removing these filters invalidates
# the evidence-based proof.
#
---
includes:
  - docs/reqstream/reviewmark-system-requirements.yaml
  - docs/reqstream/cli-requirements.yaml
  - docs/reqstream/configuration-requirements.yaml
  - docs/reqstream/glob-matcher-requirements.yaml
  - docs/reqstream/index-requirements.yaml
  - docs/reqstream/path-helpers-requirements.yaml
  - docs/reqstream/platform-requirements.yaml
  - docs/reqstream/validation-requirements.yaml
  - docs/reqstream/ots-requirements.yaml
