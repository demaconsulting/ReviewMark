---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "**/*.cs"                       # All C# source and test files
  - "requirements.yaml"             # Root requirements file
  - "docs/reqstream/**/*.yaml"         # Per-software-item requirements files
  - "docs/design/**/*.md"           # Software design documents (including subsystem folders)
  - "!**/obj/**"                    # Exclude build output
  - "!**/bin/**"                    # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/ReviewMark/reviews/index.json

# Review sets grouping files by software unit.
# Each review-set groups requirements, source, and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain:
# - requirements: what the code must do and why
# - source: what the code actually does
# - tests: which behaviors are verified and how
reviews:
  # Software unit reviews - one per unit
  - id: ReviewMark-Program
    title: Review of Program software unit (main entry point and tool orchestration)
    paths:
      - "docs/reqstream/unit-program.yaml"              # requirements
      - "docs/design/program.md"                        # design
      - "docs/user_guide/introduction.md"               # user guide
      - "src/**/Program.cs"                             # implementation
      - "test/**/ProgramTests.cs"                       # unit tests
      - "test/**/TestDirectory.cs"                      # test infrastructure

  - id: ReviewMark-Context
    title: Review of Context software unit (command-line argument handling)
    paths:
      - "docs/reqstream/cli/unit-context.yaml"              # requirements
      - "docs/design/cli/context.md"                    # design
      - "src/**/Cli/Context.cs"                         # implementation
      - "test/**/Cli/ContextTests.cs"                   # tests

  - id: ReviewMark-ReviewMarkConfiguration
    title: Review of ReviewMarkConfiguration software unit (configuration parsing and processing)
    paths:
      - "docs/reqstream/configuration/unit-review-mark-configuration.yaml"   # requirements
      - "docs/design/configuration/review-mark-configuration.md"  # design
      - "src/**/Configuration/ReviewMarkConfiguration.cs"          # implementation
      - "test/**/Configuration/ReviewMarkConfigurationTests.cs"    # tests

  - id: ReviewMark-GlobMatcher
    title: Review of GlobMatcher software unit (file pattern matching)
    paths:
      - "docs/reqstream/configuration/unit-glob-matcher.yaml"          # requirements
      - "docs/design/configuration/glob-matcher.md"      # design
      - "src/**/Configuration/GlobMatcher.cs"            # implementation
      - "test/**/Configuration/GlobMatcherTests.cs"      # tests

  - id: ReviewMark-ReviewIndex
    title: Review of ReviewIndex software unit (review evidence indexing)
    paths:
      - "docs/reqstream/indexing/unit-review-index.yaml"         # requirements
      - "docs/design/indexing/review-index.md"          # design
      - "src/**/Indexing/ReviewIndex.cs"                # implementation
      - "test/**/Indexing/IndexTests.cs"                # tests

  - id: ReviewMark-PathHelpers
    title: Review of PathHelpers software unit (file path utilities)
    paths:
      - "docs/reqstream/indexing/unit-path-helpers.yaml"          # requirements
      - "docs/design/indexing/path-helpers.md"           # design
      - "src/**/Indexing/PathHelpers.cs"                 # implementation
      - "test/**/Indexing/PathHelpersTests.cs"           # tests

  - id: ReviewMark-Validation
    title: Review of Validation software unit (self-validation test execution)
    paths:
      - "docs/reqstream/self-test/unit-validation.yaml"           # requirements
      - "docs/design/self-test/validation.md"           # design
      - "src/**/SelfTest/Validation.cs"                 # implementation
      - "test/**/SelfTest/ValidationTests.cs"           # tests

  # Subsystem reviews
  - id: ReviewMark-Cli
    title: Review of Cli subsystem (command-line interface)
    paths:
      - "docs/reqstream/cli/subsystem-cli.yaml"             # subsystem requirements
      - "docs/design/cli/context.md"                    # Context design
      - "docs/design/program.md"                        # Program design

  - id: ReviewMark-Indexing
    title: Review of Indexing subsystem (review evidence loading and path utilities)
    paths:
      - "docs/reqstream/indexing/subsystem-indexing.yaml"        # subsystem requirements
      - "docs/design/indexing/review-index.md"          # ReviewIndex design
      - "docs/design/indexing/path-helpers.md"          # PathHelpers design

  - id: ReviewMark-SelfTest
    title: Review of SelfTest subsystem (self-validation)
    paths:
      - "docs/reqstream/self-test/subsystem-self-test.yaml"       # subsystem requirements
      - "docs/design/self-test/validation.md"           # Validation design

  # Special review-sets
  - id: ReviewMark-System
    title: Review of ReviewMark system-level behavior, platform support, and integration
    paths:
      - "docs/reqstream/reviewmark-system.yaml"         # system requirements
      - "docs/reqstream/platform-requirements.yaml"     # platform requirements
      - "docs/design/introduction.md"                   # design introduction and architecture
      - "docs/design/system.md"                         # system design
      - "test/**/IntegrationTests.cs"                   # integration tests
      - "test/**/Runner.cs"                             # test infrastructure
      - "test/**/AssemblyInfo.cs"                       # test infrastructure

  - id: ReviewMark-Design
    title: Review of all ReviewMark design documentation
    paths:
      - "docs/reqstream/platform-requirements.yaml"     # platform requirements
      - "docs/design/**/*.md"                           # all design documents

  - id: ReviewMark-AllRequirements
    title: Review of all ReviewMark requirements files
    paths:
      - "requirements.yaml"                             # root requirements file
      - "docs/reqstream/**/*.yaml"                      # all requirements files
